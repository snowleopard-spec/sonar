<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonar Decrypt</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a1a; color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 1.5rem;
  }
  .card {
    background: #252525; border-radius: 12px; padding: 2rem;
    width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: #ccc; letter-spacing: 0.05em; }
  label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.06em; }
  input, textarea {
    width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    color: #e0e0e0; padding: 0.7rem 0.8rem; font-size: 0.95rem; margin-bottom: 1rem;
    font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: #556; }
  textarea { resize: none; height: 3.5rem; }
  button {
    width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
    background: #3a6; color: #fff; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; margin-bottom: 1rem;
  }
  button:active { background: #2a5; }
  .result {
    background: #1a1a1a; border-radius: 8px; padding: 0.8rem;
    min-height: 2.5rem; font-size: 1rem; word-break: break-all;
    border: 1px solid #333;
  }
  .result:empty::before { content: "—"; color: #555; }
</style>
</head>
<body>
<div class="card">
  <h1>SONAR DECRYPT</h1>
  <label for="cipher">Cipher text</label>
  <textarea id="cipher" placeholder="Paste from email"></textarea>
  <label for="key">Passphrase</label>
  <input id="key" type="password" placeholder="Enter passphrase">
  <button onclick="decrypt()">Decrypt</button>
  <div class="result" id="result"></div>
</div>
<script>
// Minimal SHA-256 implementation (no dependencies, works over HTTP)
function sha256(msg) {
  const K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];
  let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
  const bytes = new TextEncoder().encode(msg);
  const bits = bytes.length * 8;
  const padded = new Uint8Array(Math.ceil((bytes.length + 9) / 64) * 64);
  padded.set(bytes); padded[bytes.length] = 0x80;
  const dv = new DataView(padded.buffer);
  dv.setUint32(padded.length - 4, bits, false);
  for (let off = 0; off < padded.length; off += 64) {
    const w = new Int32Array(64);
    for (let i = 0; i < 16; i++) w[i] = dv.getInt32(off + i * 4, false);
    for (let i = 16; i < 64; i++) {
      const s0 = (w[i-15]>>>7|w[i-15]<<25)^(w[i-15]>>>18|w[i-15]<<14)^(w[i-15]>>>3);
      const s1 = (w[i-2]>>>17|w[i-2]<<15)^(w[i-2]>>>19|w[i-2]<<13)^(w[i-2]>>>10);
      w[i] = (w[i-16]+s0+w[i-7]+s1)|0;
    }
    let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
    for (let i = 0; i < 64; i++) {
      const S1 = (e>>>6|e<<26)^(e>>>11|e<<21)^(e>>>25|e<<7);
      const ch = (e&f)^(~e&g);
      const t1 = (h+S1+ch+K[i]+w[i])|0;
      const S0 = (a>>>2|a<<30)^(a>>>13|a<<19)^(a>>>22|a<<10);
      const maj = (a&b)^(a&c)^(b&c);
      const t2 = (S0+maj)|0;
      h=g; g=f; f=e; e=(d+t1)|0; d=c; c=b; b=a; a=(t1+t2)|0;
    }
    h0=(h0+a)|0; h1=(h1+b)|0; h2=(h2+c)|0; h3=(h3+d)|0;
    h4=(h4+e)|0; h5=(h5+f)|0; h6=(h6+g)|0; h7=(h7+h)|0;
  }
  const out = new Uint8Array(32);
  [h0,h1,h2,h3,h4,h5,h6,h7].forEach((v,i) => {
    out[i*4]=(v>>>24)&0xff; out[i*4+1]=(v>>>16)&0xff;
    out[i*4+2]=(v>>>8)&0xff; out[i*4+3]=v&0xff;
  });
  return out;
}

function decrypt() {
  const cipher = document.getElementById('cipher').value.trim();
  const key = document.getElementById('key').value;
  const el = document.getElementById('result');
  if (!cipher || !key) { el.textContent = ''; return; }
  try {
    // SHA-256 the passphrase to derive key bytes
    const keyBytes = sha256(key);
    // URL-safe Base64 → standard Base64
    const std = cipher.replace(/-/g, '+').replace(/_/g, '/');
    const bytes = Uint8Array.from(atob(std), c => c.charCodeAt(0));
    let out = '';
    for (let i = 0; i < bytes.length; i++) {
      out += String.fromCharCode(bytes[i] ^ keyBytes[i % keyBytes.length]);
    }
    el.textContent = out;
  } catch (e) {
    el.textContent = 'Error — check inputs';
  }
}
</script>
</body>
</html>
